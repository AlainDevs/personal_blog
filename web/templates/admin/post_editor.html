<section class="mx-auto max-w-4xl space-y-8">
  <div class="flex flex-col gap-4 sm:flex-row sm:items-end sm:justify-between">
    <div>
      <p class="text-sm font-semibold uppercase tracking-[0.25em] text-cyan-200">Admin</p>
      <h1 class="mt-2 text-4xl font-black text-white">{{#post}}Edit post{{/post}}{{^post}}Create post{{/post}}</h1>
    </div>
    <a href="/admin/posts" class="rounded-full border border-white/15 px-5 py-3 text-center font-bold text-white transition hover:bg-white/10">All posts</a>
  </div>

  <div class="rounded-[2rem] border border-white/10 bg-slate-900/90 p-6 shadow-2xl shadow-black/30 sm:p-8">
    <form id="postForm" class="space-y-5">
      <input type="hidden" id="postId" value="{{post.id}}">
      <div>
        <label for="title" class="mb-2 block text-sm font-bold text-slate-200">Title</label>
        <input type="text" id="title" name="title" value="{{post.title}}" class="w-full rounded-2xl border border-white/10 bg-slate-950/70 px-4 py-3 text-slate-100 outline-none transition focus:border-cyan-300/60 focus:ring-4 focus:ring-cyan-300/10" required>
      </div>
      <div>
        <label for="slug" class="mb-2 block text-sm font-bold text-slate-200">Slug</label>
        <input type="text" id="slug" name="slug" value="{{post.slug}}" class="w-full rounded-2xl border border-white/10 bg-slate-950/70 px-4 py-3 text-slate-100 outline-none transition focus:border-cyan-300/60 focus:ring-4 focus:ring-cyan-300/10" required>
      </div>
      <div>
        <label for="contentMarkdown" class="mb-2 block text-sm font-bold text-slate-200">Content Markdown</label>
        <textarea id="contentMarkdown" name="content_markdown" rows="16" class="w-full rounded-3xl border border-white/10 bg-slate-950/70 px-5 py-4 font-mono text-sm text-slate-100 outline-none transition focus:border-cyan-300/60 focus:ring-4 focus:ring-cyan-300/10" required>{{post.contentMarkdown}}</textarea>
      </div>
      <label class="flex cursor-pointer items-center gap-3 rounded-2xl bg-white/5 p-4 ring-1 ring-white/10">
        <input type="checkbox" id="published" name="published" class="h-5 w-5 rounded border-white/10 bg-slate-950 text-cyan-400" {{#post.published}}checked{{/post.published}}>
        <span class="font-bold text-slate-200">Publish this post</span>
      </label>
      <div class="flex flex-col gap-3 sm:flex-row sm:items-center">
        <button type="submit" class="rounded-full bg-cyan-400 px-6 py-3 font-bold text-slate-950 shadow-xl shadow-cyan-500/20 transition hover:bg-cyan-300">{{#post}}Update post{{/post}}{{^post}}Create post{{/post}}</button>
        <a href="/admin/posts" class="rounded-full border border-white/15 px-6 py-3 text-center font-bold text-white transition hover:bg-white/10">Cancel</a>
        <p id="postMessage" class="text-sm font-semibold text-slate-300" role="status"></p>
      </div>
    </form>
  </div>
</section>
