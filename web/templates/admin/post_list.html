<section class="space-y-8">
  <div class="flex flex-col gap-4 sm:flex-row sm:items-end sm:justify-between">
    <div>
      <p class="text-sm font-semibold uppercase tracking-[0.25em] text-cyan-200">Admin</p>
      <h1 class="mt-2 text-4xl font-black text-white">Manage posts</h1>
    </div>
    <a href="/admin/posts/new" class="rounded-full bg-cyan-400 px-5 py-3 text-center font-bold text-slate-950 shadow-xl shadow-cyan-500/20 transition hover:bg-cyan-300">Create post</a>
  </div>

  {{#hasPosts}}
  <div class="space-y-4">
    {{#posts}}
    <article class="rounded-[1.5rem] border border-white/10 bg-white/[0.08] p-5 shadow-xl shadow-black/20">
      <div class="flex flex-col gap-5 md:flex-row md:items-center md:justify-between">
        <div>
          <h2 class="text-2xl font-black text-white">{{title}}</h2>
          <p class="mt-2 text-sm text-slate-400">/{{slug}} · {{#published}}Published{{/published}}{{^published}}Draft{{/published}} · {{createdAt}}</p>
        </div>
        <div class="flex flex-wrap gap-3">
          <a href="/blog/{{slug}}" class="rounded-full border border-white/15 px-4 py-2 text-sm font-bold text-white transition hover:bg-white/10">View</a>
          <a href="/admin/posts/{{id}}/edit" class="rounded-full bg-emerald-400 px-4 py-2 text-sm font-bold text-slate-950 transition hover:bg-emerald-300">Edit</a>
          <button type="button" class="delete-post-btn rounded-full bg-rose-400 px-4 py-2 text-sm font-bold text-slate-950 transition hover:bg-rose-300" data-post-id="{{id}}">Delete</button>
        </div>
      </div>
    </article>
    {{/posts}}
  </div>
  {{/hasPosts}}

  {{^hasPosts}}
  <div class="rounded-[1.75rem] border border-dashed border-white/15 bg-white/[0.06] p-10 text-center">
    <h2 class="text-2xl font-black text-white">No posts yet</h2>
    <p class="mt-3 text-slate-300">Create the first story for your blog.</p>
  </div>
  {{/hasPosts}}
</section>
