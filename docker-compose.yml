services:
  app:
    build: .
    ports:
      - '8080:8080'
    depends_on:
      - db
  db:
    image: postgres:18
    restart: always
    environment:
      - POSTGRES_DB=blog_db
      - POSTGRES_USER=user
      - POSTGRES_PASSWORD=password
    ports:
      - '5432:5432'
    volumes:
      - db_data:/var/lib/postgresql
volumes:
  db_data: